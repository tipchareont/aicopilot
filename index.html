<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AI Marketing Copilot</title>
  <link rel="stylesheet" href="assets/css/app.css?v=5.5.0">
</head>
<body class="login-body">
  <main class="login-page">
    <section class="login-card">
      <h1>AI Marketing Copilot</h1>
      <p>Marketing Intelligence Platform</p>
      <form id="loginForm">
        <label>Username</label>
        <input id="username" type="text" placeholder="กรอก Username" required>
        <label>Password</label>
        <input id="password" type="password" placeholder="กรอก Password" required>
        <button id="loginButton" type="submit">เข้าสู่ระบบ</button>
        <p id="loginMessage" class="message"></p>
      </form>
    </section>
  </main>
  <script src="assets/js/config.js?v=5.5.0"></script>
  <script src="assets/js/auth.js?v=5.5.0"></script>
  <script src="assets/js/login.js?v=5.5.0"></script>
</body>
</html>
